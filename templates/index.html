<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>バス時刻表 Dashboard</title>
    <style>
        :root {
            --bg-color: #000000;
            --card-bg: #1c1c1e;
            --text-main: #ffffff;
            --text-sub: #d1d1d6;
            --orange: #ff9f0a;
            --blue: #32ade6;
            --green: #30d158;
            --red: #ff453a;
            --badge-bg: #2c2c2e;
            --badge-text: #ffd60a;
        }
        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            margin: 0;
            padding: 20px;
            padding-top: calc(20px + env(safe-area-inset-top));
        }
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }
        h1 {
            font-size: 20px;
            margin: 0;
            font-weight: bold;
        }
        .refresh-btn {
            background-color: var(--card-bg);
            border: 1px solid #3a3a3c;
            color: var(--text-main);
            padding: 8px 16px;
            border-radius: 20px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
        }
        .refresh-btn:active {
            background-color: #2c2c2e;
        }
        .container {
            display: flex;
            flex-direction: column;
            gap: 16px;
        }
        .card {
            background-color: var(--card-bg);
            border-radius: 16px;
            padding: 16px;
        }
        .card-title {
            font-size: 14px;
            font-weight: bold;
            color: var(--text-sub);
            margin-bottom: 12px;
            display: flex;
            align-items: center;
            gap: 6px;
        }
        .bus-list {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }
        .bus-row {
            display: flex;
            align-items: center;
            font-size: 16px;
        }
        .label {
            font-weight: bold;
            width: 45px;
            font-size: 13px;
            flex-shrink: 0;
        }
        .label-0 { color: var(--orange); }
        .label-1 { color: var(--blue); }
        .label-2 { color: var(--green); }
        
        .time {
            font-weight: 700;
            font-size: 20px;
            width: 65px;
            flex-shrink: 0;
        }
        .bus-row.primary .time {
            font-size: 26px;
            width: 75px;
        }
        
        .stop-badge {
            background-color: var(--badge-bg);
            color: var(--badge-text);
            font-size: 10px;
            font-weight: 800;
            padding: 4px 6px;
            border-radius: 6px;
            margin-right: 8px;
            white-space: nowrap;
            border: 1px solid #48484a;
            flex-shrink: 0;
        }

        .line {
            color: var(--text-sub);
            font-size: 12px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            flex: 1;
        }
        .status-msg {
            color: var(--red);
            font-weight: bold;
            font-size: 16px;
            padding: 4px 0;
        }
    </style>
</head>
<body>

    <div class="header">
        <h1 id="current-clock">00:00</h1>
        <button class="refresh-btn" onclick="updateAllLists()">更新</button>
    </div>

    <div class="container">
        <div class="card">
            <div class="card-title">🚌 大学行き</div>
            <div id="list-to_uni" class="bus-list">読み込み中...</div>
        </div>

        <div class="card">
            <div class="card-title">🚌 金沢駅行き</div>
            <div id="list-to_station" class="bus-list">読み込み中...</div>
        </div>

        <div class="card">
            <div class="card-title">🚌 中橋行き</div>
            <div id="list-to_nakahashi" class="bus-list">読み込み中...</div>
        </div>
    </div>

    <script>
        const routes = ['to_uni', 'to_station', 'to_nakahashi'];
        const labels = ['次発', '次々', '２先'];

        const stopNameMap = {
            'A': '正門向い',
            'B': '正門前',
            'C': '四十万方向',
            'D': '四十万から'
        };

        async function fetchRoute(dir) {
            try {
                const response = await fetch(`/api/next_bus?dir=${dir}`);
                const data = await response.json();
                const container = document.getElementById(`list-${dir}`);
                container.innerHTML = '';

                if (data.status === 'success' && data.buses.length > 0) {
                    data.buses.forEach((bus, index) => {
                        const row = document.createElement('div');
                        row.className = `bus-row ${index === 0 ? 'primary' : ''}`;
                        
                        const stopName = stopNameMap[bus.stop] || bus.stop;
                        const badgeText = dir === 'to_uni' ? `着: ${stopName}` : `発: ${stopName}`;

                        row.innerHTML = `
                            <div class="label label-${index}">${labels[index]}</div>
                            <div class="time">${bus.time}</div>
                            <div class="stop-badge">${badgeText}</div>
                            <div class="line">${bus.line}</div>
                        `;
                        container.appendChild(row);
                    });
                } else {
                    container.innerHTML = '<div class="status-msg">本日のバスは終了しました</div>';
                }
            } catch (error) {
                document.getElementById(`list-${dir}`).innerHTML = '<div class="status-msg" style="color:orange;">通信エラー</div>';
            }
        }

        function updateAllLists() {
            const now = new Date();
            const timeStr = now.toLocaleTimeString('ja-JP', { hour: '2-digit', minute: '2-digit' });
            document.getElementById('current-clock').innerText = timeStr;

            routes.forEach(dir => fetchRoute(dir));
        }

        updateAllLists();
        setInterval(updateAllLists, 10000); // 10秒ごとに自動更新
    </script>
</body>
</html>
