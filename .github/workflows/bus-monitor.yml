name: Bus Monitor

on:
  schedule:
    - cron: "17 5 * * *"
      timezone: "Asia/Tokyo"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: bus-monitor
  cancel-in-progress: false

jobs:
  monitor:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v7

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.13"

      - name: Restore monitor state
        uses: actions/cache@v6
        with:
          path: .monitor_state/
          key: bus-monitor-state-${{ github.ref_name }}-${{ github.run_id }}
          restore-keys: |
            bus-monitor-state-${{ github.ref_name }}-
            bus-monitor-state-

      - name: Run automated monitor
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
        run: python monitor/run_automated_monitor.py
